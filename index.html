<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTH</title>

<style>
    body {
        margin: 0;
        background: #000;
        color: #fff;

        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;

        min-height: 100vh;
        padding: 20px;

        font-family: Arial, sans-serif;
        text-align: center;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;

        max-width: 600px;
        width: 100%;
    }

    img {
        width: 60%;
        max-width: 220px;
        height: auto;
    }

    .title {
        font-size: clamp(20px, 6vw, 28px);
        font-weight: 600;
    }

    .subtitle {
        font-size: clamp(12px, 3.5vw, 14px);
        opacity: 0.7;
    }

    .themes {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 24px;
        width: 100%;
    }

    .theme-link {
        display: block;
        background: #111;
        padding: 12px 16px;
        border-radius: 12px;
        color: #fff;
        text-decoration: none;
        transition: background 0.2s;
    }

    .theme-link:hover {
        background: #222;
    }

    @media (max-width: 400px) {
        .container {
            gap: 12px;
        }
        .themes {
            gap: 8px;
        }
    }
</style>
</head>

<body>

<div class="container">

    <img src="./nth.svg" alt="NTH Logo">

    <div class="title">NanoThemeHub</div>

    <div class="subtitle">Themes for Nano 6 & 7</div>

    <div class="themes" id="themes-container">
    
    </div>

</div>

<script>


const themes = [
    {
        "name": "Dark Nano",
        "author": "User123",
        "link": "/themes/dark-nano.html"
    },
    {
        "name": "Minimal Nano",
        "author": "JaneDoe",
        "link": "/themes/minimal-nano.html"
    },
    {
        "name": "Cyber Nano",
        "author": "Neo",
        "link": "/themes/cyber-nano.html"
    }
];

const container = document.getElementById("themes-container");

themes.forEach(theme => {
    const a = document.createElement("a");
    a.href = theme.link;
    a.className = "theme-link";
    a.textContent = `${theme.name} — ${theme.author}`;
    container.appendChild(a);
});
</script>

</body>
</html>
